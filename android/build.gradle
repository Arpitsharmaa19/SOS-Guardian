buildscript {
    ext.kotlin_version = '2.1.0'  

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.9.1") 
        classpath("com.google.gms:google-services:4.4.1") 
        classpath ("org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.0")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"

    // Force Kotlin version for all subprojects
    project.configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('kotlin-gradle-plugin')) {
                details.useVersion "1.9.22"
            }
            if (details.requested.group == 'androidx.core' && (details.requested.name == 'core-ktx' || details.requested.name == 'core')) {
                details.useVersion "1.13.1"
            }
        }
    }

    // Directly set namespace if missing using the library plugin ID
    project.pluginManager.withPlugin("com.android.library") {
        if (project.android.namespace == null) {
            project.android.namespace = "com.sosguardian.${project.name.replace('-', '.')}"
        }
    }

    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

